<!-- Default Emergency Support Section -->
<div
    class="emergency-support-area bg-d9eff9"
    [ngClass]="{'d-none': router.url === '/index-2' || router.url === '/index-3'}"
>
    <div class="container">
        <div class="emergency-support-inner" *ngIf="emergencyData">
            <div class="row">
                <div class="col-lg-6 col-md-6 col-sm-6">
                    <div class="box">
                        <h6>{{emergencyData.title}}</h6>
                        <a href="tel:{{emergencyData.phoneNumber}}" class="d-flex align-items-center">
                            <i class="flaticon-call"></i>
                            {{emergencyData.phoneNumber}}
                        </a>
                    </div>
                </div>
                <div class="col-lg-6 col-md-6 col-sm-6">
                    <div class="box">
                        <h6>{{emergencyData.title2}}</h6>
                        <a routerLink="{{emergencyData.link}}" class="d-flex align-items-center">
                            <i class="flaticon-calendar"></i>
                            {{emergencyData.linkText}}
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Emergency Support Section for Home Demo - 2 & 3 -->
<div
    class="emergency-support-area ptb-75 bg-main-color d-none"
    [ngClass]="{'d-block': router.url === '/index-2' || router.url === '/index-3'}"
>
    <div class="container">
        <div class="emergency-support-inner style-two" *ngIf="emergencyData">
            <div class="row">
                <div class="col-lg-6 col-md-6 col-sm-6">
                    <div class="box">
                        <h6>{{emergencyData.title}}</h6>
                        <a href="tel:{{emergencyData.phoneNumber}}" class="d-flex align-items-center">
                            <i class="flaticon-call"></i>
                            {{emergencyData.phoneNumber}}
                        </a>
                    </div>
                </div>
                <div class="col-lg-6 col-md-6 col-sm-6">
                    <div class="box">
                        <h6>{{emergencyData.title2}}</h6>
                        <a routerLink="{{emergencyData.link}}" class="d-flex align-items-center">
                            <i class="flaticon-calendar"></i>
                            {{emergencyData.linkText}}
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="shape3"><img src="assets/img/shape/shape3.png" alt="shape3"></div>
    <div class="shape4"><img src="assets/img/shape/shape4.png" alt="shape4"></div>
</div>
