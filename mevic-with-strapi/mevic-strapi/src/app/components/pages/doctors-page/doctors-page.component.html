<!-- Page Title Area -->
<div class="page-title-area">
    <div class="container">
        <div class="page-title-content">
            <ul>
                <li>
                    <a routerLink="/">
                        Home
                    </a>
                </li>
                <li>
                    Doctors
                </li>
            </ul>
            <h1>Our Doctors</h1>
        </div>
    </div>
    <div class="shape5 animate__animated animate__fadeInDown">
        <img src="assets/img/shape/shape5.png" alt="shape">
    </div>
    <div class="shape6 animate__animated animate__fadeInUp">
        <img src="assets/img/shape/shape6.png" alt="shape">
    </div>
</div>

<!-- Doctors Area -->
<div class="doctors-area ptb-100">
    <div class="container">
        <div class="row">
            <div class="col-lg-4 col-md-12">
                <div class="filter-sidebar">
                    <div class="sidebar-title">
                        <h3>FILTERS</h3>
                        <span>RESET</span>
                    </div>
                    <div class="accordion">
                        <div class="accordion-item">
                            <button class="accordion-button" type="button">
                                SPECIALITY
                            </button>
                            <div class="accordion-body">
                                <ul>
                                    <li class="speciality">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="addiction-medicine">
                                            <label class="form-check-label" for="addiction-medicine">
                                                Addiction Medicine
                                            </label>
                                        </div>
                                    </li>
                                    <li class="speciality">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="addiction-psychiatry">
                                            <label class="form-check-label" for="addiction-psychiatry">
                                                Addiction Psychiatry
                                            </label>
                                        </div>
                                    </li>
                                    <li class="speciality">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="adolescent-medicine">
                                            <label class="form-check-label" for="adolescent-medicine">
                                                Adolescent Medicine
                                            </label>
                                        </div>
                                    </li>
                                    <li class="speciality">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="allergy-immunology">
                                            <label class="form-check-label" for="allergy-immunology">
                                                Allergy & Immunology
                                            </label>
                                        </div>
                                    </li>
                                    <li class="speciality">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="cardiac-electrophysiology">
                                            <label class="form-check-label" for="cardiac-electrophysiology">
                                                Cardiac Electrophysiology
                                            </label>
                                        </div>
                                    </li>
                                    <li class="speciality">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="dermatologists">
                                            <label class="form-check-label" for="dermatologists">
                                                Dermatologists
                                            </label>
                                        </div>
                                    </li>
                                    <li class="speciality">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="ophthalmologists">
                                            <label class="form-check-label" for="ophthalmologists">
                                                Ophthalmologists
                                            </label>
                                        </div>
                                    </li>
                                    <li class="speciality">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="obstetrician-gynecologists">
                                            <label class="form-check-label" for="obstetrician-gynecologists">
                                                Obstetrician / Gynecologists
                                            </label>
                                        </div>
                                    </li>
                                    <li class="speciality">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="otolaryngologists">
                                            <label class="form-check-label" for="otolaryngologists">
                                                Otolaryngologists
                                            </label>
                                        </div>
                                    </li>
                                    <li class="speciality">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="radiologists">
                                            <label class="form-check-label" for="radiologists">
                                                Radiologists
                                            </label>
                                        </div>
                                    </li>
                                    <li class="speciality">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="orthopedic-surgeons">
                                            <label class="form-check-label" for="orthopedic-surgeons">
                                                Orthopedic Surgeons
                                            </label>
                                        </div>
                                    </li>
                                </ul>
                            </div>
                        </div>
                        <div class="accordion-item">
                            <button class="accordion-button" type="button">
                                REASON FOR VISIT
                            </button>
                            <div class="accordion-body">
                                <ul>
                                    <li class="reason-for-visit">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="allergy">
                                            <label class="form-check-label" for="allergy">
                                                Allergy
                                            </label>
                                        </div>
                                    </li>
                                    <li class="reason-for-visit">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="angioplasty-stent-placement">
                                            <label class="form-check-label" for="angioplasty-stent-placement">
                                                Angioplasty & Stent Placement
                                            </label>
                                        </div>
                                    </li>
                                    <li class="reason-for-visit">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="arrhythmias">
                                            <label class="form-check-label" for="arrhythmias">
                                                Arrhythmias
                                            </label>
                                        </div>
                                    </li>
                                    <li class="reason-for-visit">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="arthroscopic-surgery">
                                            <label class="form-check-label" for="arthroscopic-surgery">
                                                Arthroscopic Surgery
                                            </label>
                                        </div>
                                    </li>
                                    <li class="reason-for-visit">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="brain-tumors">
                                            <label class="form-check-label" for="brain-tumors">
                                                Brain Tumors
                                            </label>
                                        </div>
                                    </li>
                                    <li class="reason-for-visit">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="mental-disorders">
                                            <label class="form-check-label" for="mental-disorders">
                                                Mental Disorders
                                            </label>
                                        </div>
                                    </li>
                                    <li class="reason-for-visit">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="injury-poison">
                                            <label class="form-check-label" for="injury-poison">
                                                Injury / Poison
                                            </label>
                                        </div>
                                    </li>
                                    <li class="reason-for-visit">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="endocrine">
                                            <label class="form-check-label" for="endocrine">
                                                Endocrine
                                            </label>
                                        </div>
                                    </li>
                                    <li class="reason-for-visit">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="circulatory">
                                            <label class="form-check-label" for="circulatory">
                                                Circulatory
                                            </label>
                                        </div>
                                    </li>
                                    <li class="reason-for-visit">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="respiratory">
                                            <label class="form-check-label" for="respiratory">
                                                Respiratory
                                            </label>
                                        </div>
                                    </li>
                                    <li class="reason-for-visit">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="musculoskeletal">
                                            <label class="form-check-label" for="musculoskeletal">
                                                Musculoskeletal
                                            </label>
                                        </div>
                                    </li>
                                </ul>
                            </div>
                        </div>
                        <div class="accordion-item">
                            <button class="accordion-button" type="button">
                                GENDER
                            </button>
                            <div class="accordion-body">
                                <ul>
                                    <li>
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="male">
                                            <label class="form-check-label" for="male">
                                                Male
                                            </label>
                                        </div>
                                    </li>
                                    <li>
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="female">
                                            <label class="form-check-label" for="female">
                                                Female
                                            </label>
                                        </div>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-8 col-md-12" *ngIf="doctorsData">
                <div class="row">
                    <div class="col-xl-6 col-lg-12 col-md-6" *ngFor="let content of doctorsData | paginate: { itemsPerPage: 8, currentPage }">
                        <div class="single-doctor-box">
                            <div class="image">
                                <img [src]="content.attributes.image.data.attributes.url" alt="doctor-image">
                                <div class="icon">
                                    <i class="{{content.attributes.icon}}"></i>
                                </div>
                            </div>
                            <div class="content">
                                <h3>
                                    <a [routerLink]="['/doctor-profile', content.attributes.slug]">
                                        {{content.attributes.name}}
                                    </a>
                                </h3>
                                <span class="designation">{{content.attributes.designation}}</span>
                                <p>{{content.attributes.shortDesc}}</p>
                                <div class="d-flex align-items-center justify-content-between">
                                    <ul class="social">
                                        <li *ngFor="let item of content.attributes.socials;">
                                            <a href="{{item.link}}" target="_blank">
                                                <i class="{{item.icon}}"></i>
                                            </a>
                                        </li>
                                    </ul>
                                    <a
                                        [routerLink]="['/doctor-profile', content.attributes.slug]"
                                        class="link-btn"
                                    >
                                        View Profile <i class="ph-caret-right"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-12 col-lg-12 col-md-12" *ngIf="doctorsData?.length > 8">
                        <div class="pagination-area">
                            <pagination-controls previousLabel="" nextLabel="" (pageChange)="onPageChange($event)"></pagination-controls>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
